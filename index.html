<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSO Procurement System | LGU Pagbilao</title>
    
    <!-- 1. EMERGENCY CACHE & SERVICE WORKER TERMINATION: Synchronous Head Block 
         This must run before any module scripts execute to prevent Mobile Chrome intercepts. -->
    <script>
      (function() {
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              for(let registration of registrations) {
                registration.unregister();
                console.log('Mobile Chrome Safety: SW Unregistered');
              }
            });
          }
          if ('caches' in window) {
            caches.keys().then(function(names) {
              for (let name of names) caches.delete(name);
              console.log('Mobile Chrome Safety: Cache Cleaned');
            });
          }
        } catch (e) {
          console.warn('Cache breaker failed (Non-critical):', e);
        }
      })();
    </script>

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F172A" />
    <link rel="apple-touch-icon" href="https://github.com/251805/sirpacheck/blob/main/gso.png?raw=true" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <!-- 2. FLAT MOUNT TARGET -->
    <div id="root"></div>

    <!-- 3. FLAT REPOSITORY MAPPING: Direct root reference (No /src/ prefix) -->

  </body>
